schema_version: 1

context:
  name: dynasor
  version: 2.3

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/dynasor-${{ version }}.tar.gz
  sha256: b9e582e0f6260b3d63d1428167eddfeb3518d51a42679abef64beac7927c06db

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - scipy
    - python >=${{ python_min }}
    - ase
    - mdanalysis
    - numba >=0.55
    - numpy >=1.18
    - pandas >=2.2
    - importlib-metadata <5

tests:
  - python:
      imports:
        - dynasor
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  license: MIT
  license_file: LICENSE
  summary: A tool for calculating dynamical structure factors
  description: |
    dynasor is a simple tool for calculating total and partial
    dynamical structure factors as well as current correlation
    functions from molecular dynamics (MD) simulations. The main
    input consists of a trajectory output from a MD simulation,
    i.e., a file containing snapshots of the particle coordinates
    and optionally velocities that correspond to consecutive,
    equally spaced points in (simulation) time.
  homepage: https://dynasor.materialsmodeling.org
  repository: https://gitlab.com/materials-modeling/dynasor
  documentation: https://dynasor.materialsmodeling.org

extra:
  recipe-maintainers:
    - jan-janssen
    - erhart1
